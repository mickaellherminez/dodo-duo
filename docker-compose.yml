services:
  mysql:
    image: mysql:8.0
    container_name: saasforge-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: saas_forge
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: saasforge
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
    driver: local

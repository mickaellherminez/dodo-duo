# Production Docker Compose — SaaSForge
# Usage: docker-compose -f docker-compose.prod.yml up -d
#
# Required environment variables (set in shell or via --env-file):
#   DB_PASSWORD          — MySQL application user password
#   MYSQL_ROOT_PASSWORD  — MySQL root password
#   APP_KEY              — Laravel application key (php artisan key:generate)
#
# Example:
#   cp .env.production.example .env.docker
#   # Fill in DB_PASSWORD, MYSQL_ROOT_PASSWORD, APP_KEY in .env.docker
#   docker-compose -f docker-compose.prod.yml --env-file .env.docker up -d

x-app-env: &app-env
  APP_ENV: production
  APP_DEBUG: "false"
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: 3306
  DB_DATABASE: saasforge
  DB_USERNAME: saasforge
  DB_PASSWORD: "${DB_PASSWORD}"
  CACHE_STORE: redis
  SESSION_DRIVER: redis
  QUEUE_CONNECTION: redis
  REDIS_HOST: redis

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      <<: *app-env
    volumes:
      - ./storage:/var/www/html/storage
      - ./.env:/var/www/html/.env:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *app-env
    volumes:
      - ./storage:/var/www/html/storage
      - ./.env:/var/www/html/.env:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    # --max-time ensures the worker restarts periodically to free memory
    command: php artisan queue:work --tries=3 --sleep=3 --max-time=3600
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: saasforge
      MYSQL_USER: saasforge
      MYSQL_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
